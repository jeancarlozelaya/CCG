<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Entrada de Residuos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="date"], input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }
        .radio-item {
            display: flex;
            align-items: center;
        }
        .radio-item input {
            margin-right: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            display: block;
            margin: 20px auto 0;
        }
        button:hover {
            background-color: #45a049;
        }
        .required:after {
            content: " *";
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Registro de Entrada de Residuos</h1>
        <form id="residuosForm">
            <div class="form-group">
                <label for="fechaIngreso" class="required">Fecha de Ingreso</label>
                <input type="date" id="fechaIngreso" name="fechaIngreso" required>
            </div>
            
            <div class="form-group">
                <label class="required">Tipo de Residuo</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="comun" name="tipoResiduo" value="Común" required>
                        <label for="comun">Común</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="plastico" name="tipoResiduo" value="Plástico">
                        <label for="plastico">Plástico</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="aluminio" name="tipoResiduo" value="Aluminio">
                        <label for="aluminio">Aluminio</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="carton" name="tipoResiduo" value="Cartón">
                        <label for="carton">Cartón</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="vidrio" name="tipoResiduo" value="Vidrio">
                        <label for="vidrio">Vidrio</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="rpbi" name="tipoResiduo" value="RPBI">
                        <label for="rpbi">RPBI</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="cantidad" class="required">Cantidad (libras)</label>
                <input type="number" id="cantidad" name="cantidad" step="0.01" min="0" required>
            </div>
            
            <div class="form-group">
                <label class="required">Clasificación</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="organico" name="clasificacion" value="Orgánico" required>
                        <label for="organico">Orgánico</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="inorganico" name="clasificacion" value="Inorgánico">
                        <label for="inorganico">Inorgánico</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="required">Estado Físico</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="solido" name="estadoFisico" value="Sólido" required>
                        <label for="solido">Sólido</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="liquido" name="estadoFisico" value="Líquido">
                        <label for="liquido">Líquido</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="gaseoso" name="estadoFisico" value="Gaseoso">
                        <label for="gaseoso">Gaseoso</label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="responsable" class="required">Responsable</label>
                <input type="text" id="responsable" name="responsable" required>
            </div>
            
            <button type="submit">Registrar Entrada</button>
        </form>
    </div>

    <script>
        document.getElementById('residuosForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Obtener valores del formulario
            const fechaIngreso = document.getElementById('fechaIngreso').value;
            const cantidad = document.getElementById('cantidad').value;
            const responsable = document.getElementById('responsable').value;
            
            // Obtener tipo de residuo seleccionado
            const tipoResiduo = document.querySelector('input[name="tipoResiduo"]:checked').value;
            
            // Obtener clasificación seleccionada
            const clasificacion = document.querySelector('input[name="clasificacion"]:checked').value;
            
            // Obtener estado físico seleccionado
            const estadoFisico = document.querySelector('input[name="estadoFisico"]:checked').value;
            
            // Obtener el nombre de la hoja basado en la fecha (MM-AA)
            const fecha = new Date(fechaIngreso);
            const nombreHoja = `${String(fecha.getMonth() + 1).padStart(2, '0')}-${String(fecha.getFullYear()).slice(-2)}`;
            
            // Preparar datos para enviar
            const datos = {
                fechaIngreso: fechaIngreso,
                comun: tipoResiduo === 'Común' ? 'X' : '',
                plastico: tipoResiduo === 'Plástico' ? 'X' : '',
                aluminio: tipoResiduo === 'Aluminio' ? 'X' : '',
                carton: tipoResiduo === 'Cartón' ? 'X' : '',
                vidrio: tipoResiduo === 'Vidrio' ? 'X' : '',
                rpbi: tipoResiduo === 'RPBI' ? 'X' : '',
                cantidad: cantidad,
                organico: clasificacion === 'Orgánico' ? 'X' : '',
                inorganico: clasificacion === 'Inorgánico' ? 'X' : '',
                solido: estadoFisico === 'Sólido' ? 'X' : '',
                liquido: estadoFisico === 'Líquido' ? 'X' : '',
                gaseoso: estadoFisico === 'Gaseoso' ? 'X' : '',
                responsable: responsable,
                nombreHoja: nombreHoja
            };
            
            // Enviar datos a Google Sheets
            enviarDatos(datos);
        });

        function enviarDatos(datos) {
            // URL de tu Web App de Google Apps Script
            const webAppUrl = 'https://script.google.com/macros/s/AKfycbxPuRAv9-5AWRpdnJSwxgHnxX9qdDPgH9jV7qkPfiNmJs2WG13gm4ehY4JNRSCB9940/exec'; // Reemplazar con la URL de tu Web App
            
            fetch(webAppUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(datos)
            })
            .then(() => {
                alert('Registro de entrada guardado exitosamente');
                document.getElementById('residuosForm').reset();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Ocurrió un error al guardar el registro');
            });
        }
    </script>
</body>
</html>
