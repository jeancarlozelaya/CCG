<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pisos Brillantes - Inventario General</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --light-color: #ecf0f1;
            --dark-color: #34495e;
            --text-color: #333;
            --border-color: #ddd;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
            color: white;
            text-align: center;
            padding: 18px 0;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: var(--shadow);
        }

        /* TABS PRINCIPALES */
        .main-tabs {
            display: flex;
            gap: 10px;
            margin: 25px auto 0;
            max-width: 1200px;
            padding: 0 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .main-tab {
            flex: 1;
            min-width: 200px;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            background: white;
            color: var(--dark-color);
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }
        .main-tab i {
            font-size: 1.2rem;
        }
        .main-tab.active {
            border-color: var(--secondary-color);
            background: linear-gradient(135deg, #e8f4fd, #d4eaf7);
            color: var(--secondary-color);
            transform: translateY(-3px);
        }
        .main-tab:hover:not(.active) {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Tarjetas de sección */
        .section-card {
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .section-header {
            background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
            color: white;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-header h2 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stats-badge {
            background: rgba(255,255,255,0.2);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .section-body {
            padding: 25px;
        }

        /* Buscador */
        .search-box {
            margin-bottom: 25px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 14px 20px;
            padding-left: 45px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: var(--transition);
        }
        .search-box input:focus {
            border-color: var(--secondary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.2);
        }
        .search-box:before {
            content: '\f002';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            z-index: 2;
        }

        /* Categorías */
        .category-separator {
            width: 100%;
            text-align: left;
            margin: 20px 0 15px 0;
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
            color: white;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .category-separator:hover {
            background: linear-gradient(135deg, var(--dark-color), var(--primary-color));
            transform: translateX(5px);
        }
        .category-separator .toggle-icon {
            transition: transform 0.3s ease;
        }
        .category-separator.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        /* Grid de productos */
        .productos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .producto-card {
            background: white;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
            transition: var(--transition);
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .producto-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            border-color: var(--secondary-color);
        }
        .producto-imagen {
            width: 65px;
            height: 65px;
            background: #f8f9fa;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            flex-shrink: 0;
        }
        .producto-imagen img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .producto-info {
            flex: 1;
        }
        .producto-info h4 {
            font-size: 1rem;
            margin-bottom: 8px;
            color: var(--dark-color);
            font-weight: 600;
        }
        .cantidad-badge {
            display: inline-block;
            background: var(--success-color);
            color: white;
            padding: 5px 14px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .cantidad-badge.agotado {
            background: var(--accent-color);
        }
        .cantidad-badge.ilimitado {
            background: var(--warning-color);
            color: #333;
        }

        /* Sección Químicos */
        .quimicos-container {
            background: #fef9e6;
            border-radius: 16px;
            padding: 20px;
            border-left: 5px solid var(--warning-color);
        }
        .quimicos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .quimicos-header h3 {
            color: var(--warning-color);
            font-weight: 700;
            margin: 0;
        }
        .quimicos-table-container {
            overflow-x: auto;
            border-radius: 12px;
            max-height: 500px;
            overflow-y: auto;
            position: relative;
        }
        .quimicos-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
        }
        .quimicos-table thead th {
            background: var(--primary-color);
            color: white;
            padding: 12px 15px;
            font-weight: 600;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .quimicos-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            text-align: center;
            vertical-align: middle;
        }
        .quimicos-table tr:hover {
            background: #f8f9fa;
        }
        .vencimiento-expirado {
            background-color: #e74c3c !important;
            color: white !important;
        }
        .vencimiento-cercano {
            background-color: #f39c12 !important;
            color: black !important;
        }
        .badg-quimico-entrada {
            background: var(--success-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .badg-quimico-salida {
            background: var(--accent-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        /* Sub-tabs para químicos */
        .sub-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .sub-tab {
            padding: 8px 20px;
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--dark-color);
            cursor: pointer;
            border-radius: 20px;
            transition: var(--transition);
        }
        .sub-tab.active {
            background: var(--secondary-color);
            color: white;
        }
        .sub-tab:hover:not(.active) {
            background: #ecf0f1;
        }

        /* Filtros historial - MEJORADO para que abarquen todo el ancho */
        .filtros-historial {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
        }
        .filtros-historial select, 
        .filtros-historial input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            background: white;
            transition: var(--transition);
        }
        .filtros-historial select:focus,
        .filtros-historial input:focus {
            border-color: var(--secondary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }
        .filtros-historial label {
            display: none;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #ccc;
        }

        /* Loading overlay - CORREGIDO con el texto original */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .overlay-content {
            text-align: center;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(52, 152, 219, 0.2);
            border-radius: 50%;
            border-top-color: var(--secondary-color);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loadingMessage p {
            margin: 0;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                font-size: 1.2rem;
                padding: 12px 0;
            }
            .main-tabs {
                padding: 0 15px;
                gap: 8px;
            }
            .main-tab {
                min-width: 140px;
                font-size: 0.85rem;
                padding: 12px 15px;
            }
            .section-header h2 {
                font-size: 1.2rem;
            }
            .productos-grid {
                grid-template-columns: 1fr;
            }
            .producto-card {
                padding: 12px;
            }
            .producto-imagen {
                width: 50px;
                height: 50px;
            }
            .quimicos-table th, .quimicos-table td {
                padding: 10px 8px;
                font-size: 0.85rem;
            }
            .sub-tabs {
                justify-content: center;
            }
            .filtros-historial {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 15px;
            }
            .filtros-historial select,
            .filtros-historial input {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    Pisos Brillantes
</div>

<!-- TABS DE NAVEGACIÓN -->
<div class="main-tabs">
    <button class="main-tab active" onclick="cambiarSeccion('inventario')" id="tab-inventario">
        <i class="fas fa-boxes"></i> Inventario General
    </button>
    <button class="main-tab" onclick="cambiarSeccion('quimicos')" id="tab-quimicos">
        <i class="fas fa-flask"></i> Químicos & Aromas
    </button>
</div>

<div class="container">
    <!-- SECCIÓN INVENTARIO GENERAL (excluye Químicos & Aromas) -->
    <div id="seccion-inventario" style="display: block;">
        <div class="section-card">
            <div class="section-header">
                <h2><i class="fas fa-box-open"></i> Inventario de Productos</h2>
                <div class="stats-badge">
                    <i class="fas fa-chart-line"></i> Total productos: <span id="totalProductosGeneral">0</span>
                </div>
            </div>
            <div class="section-body">
                <div class="search-box">
                    <input type="text" id="buscadorGeneral" placeholder="Buscar productos...">
                </div>
                <div id="productosContainer"></div>
            </div>
        </div>
    </div>

    <!-- SECCIÓN QUÍMICOS & AROMAS (con inventario + historial) -->
    <div id="seccion-quimicos" style="display: none;">
        <div class="section-card">
            <div class="section-header" style="background: linear-gradient(135deg, #e67e22, #f39c12);">
                <h2><i class="fas fa-flask"></i> Químicos & Aromas</h2>
                <div class="stats-badge">
                    <i class="fas fa-chart-line"></i> Total: <span id="totalQuimicos">0</span> unidades
                </div>
            </div>
            <div class="section-body">
                <!-- Sub-tabs dentro de químicos -->
                <div class="sub-tabs">
                    <button class="sub-tab active" onclick="cambiarSubSeccionQuimicos('inventario')" id="subtab-inventario">
                        <i class="fas fa-boxes"></i> Inventario
                    </button>
                    <button class="sub-tab" onclick="cambiarSubSeccionQuimicos('historial')" id="subtab-historial">
                        <i class="fas fa-history"></i> Historial de Entradas / Salidas
                    </button>
                </div>

                <!-- Sub-sección: Inventario de químicos -->
                <div id="quimicos-inventario" style="display: block;">
                    <div class="search-box">
                        <input type="text" id="buscadorQuimicos" placeholder="Buscar productos químicos...">
                    </div>
                    <div id="quimicosContainer"></div>
                </div>

                <!-- Sub-sección: Historial de movimientos -->
                <div id="quimicos-historial" style="display: none;">
                    <div class="filtros-historial">
                        <select id="filtroTipoHistorial">
                            <option value="todos">Todos</option>
                            <option value="entrada">Entradas</option>
                            <option value="salida">Salidas</option>
                        </select>
                        <select id="filtroMesHistorial">
                            <option value="todos">Mes</option>
                        </select>
                        <select id="filtroAnioHistorial">
                            <option value="todos">Año</option>
                        </select>
                        <input type="text" id="filtroProductoHistorial" placeholder="Buscar producto...">
                    </div>
                    <div class="quimicos-table-container" style="max-height: 500px;">
                        <table class="quimicos-table" id="tablaHistorialQuimicos">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Tipo</th>
                                    <th>Producto</th>
                                    <th>Vence</th>
                                    <th>Cantidad</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div class="text-end mt-3 fw-bold">
                        Total: <span id="totalCantidadHistorial">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="overlay">
    <div class="overlay-content">
        <div class="spinner"></div>
        <div id="loadingMessage">
            <p>Por favor espera un momento...</p>
        </div>
    </div>
</div>

<script>
    // URLs de los scripts de Google
    const URL_INVENTARIO_GENERAL = "https://script.google.com/macros/s/AKfycbyMZUEvDw8iWtbfRomnjmYaz1ZGD52FybVRnow4XWohUfD9Z52a_68yDMYwxugc24Rj/exec";
    const URL_QUIMICOS_INVENTARIO = "https://script.google.com/macros/s/AKfycbzR675y6ZqS85Hvh1XI2SeDXL-AvK0-ixNDaAzZg6kLlzWUTVq7v2ZJGpImGK2im8Y9Lg/exec";
    const URL_QUIMICOS_ENTRADAS = "https://script.google.com/macros/s/AKfycby_Scu1lmbidqS8_VIIHz1SNpg5iikJb53L1BPmdlcgFRZtTob8AI2x9nxLtAEhI2O_/exec";
    const URL_QUIMICOS_SALIDAS = "https://script.google.com/macros/s/AKfycbwVMcwv6vjjKq5sbwdeY7qgdzDkpNXYILG-OZ5Gb7yLLA5s2dCFATgVGEi8Aqf6LRjeBw/exec";

    let inventarioGeneral = [];
    let quimicosInventario = [];
    let historialEntradas = [];
    let historialSalidas = [];

    // Cambiar entre secciones principales
    function cambiarSeccion(seccion) {
        document.getElementById('seccion-inventario').style.display = 'none';
        document.getElementById('seccion-quimicos').style.display = 'none';
        
        document.querySelectorAll('.main-tab').forEach(tab => tab.classList.remove('active'));
        
        if (seccion === 'inventario') {
            document.getElementById('seccion-inventario').style.display = 'block';
            document.getElementById('tab-inventario').classList.add('active');
        } else if (seccion === 'quimicos') {
            document.getElementById('seccion-quimicos').style.display = 'block';
            document.getElementById('tab-quimicos').classList.add('active');
            if (document.getElementById('quimicos-inventario').style.display === 'block') {
                mostrarInventarioQuimicos(quimicosInventario);
            } else {
                cargarHistorialQuimicos();
            }
        }
    }

    // Cambiar entre sub-secciones de químicos
    function cambiarSubSeccionQuimicos(subSeccion) {
        const inventarioDiv = document.getElementById('quimicos-inventario');
        const historialDiv = document.getElementById('quimicos-historial');
        const subtabInv = document.getElementById('subtab-inventario');
        const subtabHist = document.getElementById('subtab-historial');
        
        if (subSeccion === 'inventario') {
            inventarioDiv.style.display = 'block';
            historialDiv.style.display = 'none';
            subtabInv.classList.add('active');
            subtabHist.classList.remove('active');
            mostrarInventarioQuimicos(quimicosInventario);
        } else {
            inventarioDiv.style.display = 'none';
            historialDiv.style.display = 'block';
            subtabInv.classList.remove('active');
            subtabHist.classList.add('active');
            cargarHistorialQuimicos();
        }
    }

    // ==================== INVENTARIO GENERAL ====================
    function cargarInventarioGeneral() {
        return new Promise((resolve, reject) => {
            $.get(URL_INVENTARIO_GENERAL, function(data) {
                if (data.error) {
                    Swal.fire('Error', 'No se pudo cargar el inventario: ' + data.mensaje, 'error');
                    reject(data.error);
                    return;
                }
                
                procesarInventarioGeneral(data.productos || []);
                resolve();
            }).fail(function() {
                Swal.fire('Error', 'No se pudo conectar al servidor para inventario general', 'error');
                reject();
            });
        });
    }

    function procesarInventarioGeneral(productosRaw) {
        const categoriasMap = new Map();
        let currentCategory = null;
        
        productosRaw.forEach(producto => {
            if (producto.nombre && producto.nombre.startsWith("-")) {
                currentCategory = producto.nombre.substring(1).trim();
                if (currentCategory !== "Químicos & Aromas" && !categoriasMap.has(currentCategory)) {
                    categoriasMap.set(currentCategory, []);
                }
                return;
            }
            
            if (currentCategory && currentCategory !== "Químicos & Aromas" && categoriasMap.has(currentCategory)) {
                let cantidad = producto.cantidad;
                let cantidadDisplay = cantidad;
                let cantidadClass = '';
                
                if (cantidad === '-') {
                    cantidadDisplay = '∞ Ilimitado';
                    cantidadClass = 'ilimitado';
                } else if (cantidad === 0 || cantidad === '0') {
                    cantidadDisplay = '0';
                    cantidadClass = 'agotado';
                } else if (!cantidad && cantidad !== 0) {
                    return;
                } else {
                    cantidadDisplay = cantidad;
                    cantidadClass = '';
                }
                
                categoriasMap.get(currentCategory).push({
                    id: producto.id || Date.now(),
                    nombre: producto.nombre || 'Sin nombre',
                    cantidad: cantidad,
                    cantidadDisplay: cantidadDisplay,
                    cantidadClass: cantidadClass,
                    imagen: producto.imagen || '',
                    devolucion: producto.devolucion || ''
                });
            }
        });
        
        const categoriasArray = [];
        for (let [nombre, productos] of categoriasMap.entries()) {
            if (productos.length > 0) {
                categoriasArray.push({
                    nombre: nombre,
                    productos: productos
                });
            }
        }
        
        inventarioGeneral = categoriasArray;
        
        const totalProductos = categoriasArray.reduce((sum, cat) => sum + cat.productos.length, 0);
        document.getElementById('totalProductosGeneral').innerText = totalProductos;
        
        mostrarInventarioGeneral();
    }

    function mostrarInventarioGeneral() {
        const container = document.getElementById('productosContainer');
        container.innerHTML = '';
        
        if (inventarioGeneral.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <h3>No hay productos disponibles</h3>
                    <p>No se encontraron productos en el inventario</p>
                </div>
            `;
            return;
        }
        
        inventarioGeneral.forEach(categoria => {
            const categoryDiv = document.createElement('div');
            categoryDiv.className = 'category-separator';
            categoryDiv.innerHTML = `
                <strong>${categoria.nombre}</strong>
                <span class="toggle-icon">▼</span>
            `;
            
            const productosGrid = document.createElement('div');
            productosGrid.className = 'productos-grid';
            
            categoria.productos.forEach(producto => {
                const cantidadClass = producto.cantidadClass === 'agotado' ? 'agotado' : 
                                    (producto.cantidadClass === 'ilimitado' ? 'ilimitado' : '');
                
                const productCard = document.createElement('div');
                productCard.className = 'producto-card';
                productCard.innerHTML = `
                    <div class="producto-imagen">
                        ${producto.imagen ? `<img src="${producto.imagen}" alt="${producto.nombre}" onerror="this.style.display='none'">` : '<i class="fas fa-box" style="font-size: 28px; color: #ccc;"></i>'}
                    </div>
                    <div class="producto-info">
                        <h4>${escapeHTML(producto.nombre)}</h4>
                        <span class="cantidad-badge ${cantidadClass}">
                            ${producto.cantidadDisplay} disponible${producto.cantidad !== 1 && producto.cantidad !== '-' && producto.cantidad !== 0 ? 's' : ''}
                        </span>
                    </div>
                `;
                productosGrid.appendChild(productCard);
            });
            
            container.appendChild(categoryDiv);
            container.appendChild(productosGrid);
            
            categoryDiv.addEventListener('click', function(e) {
                e.stopPropagation();
                const grid = this.nextElementSibling;
                const icon = this.querySelector('.toggle-icon');
                
                if (grid.style.display === 'none') {
                    grid.style.display = 'grid';
                    icon.innerHTML = '▼';
                    this.classList.remove('collapsed');
                } else {
                    grid.style.display = 'none';
                    icon.innerHTML = '▶';
                    this.classList.add('collapsed');
                }
            });
        });
        
        configurarBuscadorGeneral();
    }
    
    function configurarBuscadorGeneral() {
        const buscador = document.getElementById('buscadorGeneral');
        buscador.addEventListener('input', function() {
            const termino = this.value.toLowerCase().trim();
            const categorias = document.querySelectorAll('#productosContainer > .category-separator');
            const grids = document.querySelectorAll('#productosContainer > .productos-grid');
            
            if (termino === '') {
                categorias.forEach(cat => cat.style.display = 'flex');
                grids.forEach(grid => grid.style.display = 'grid');
                return;
            }
            
            categorias.forEach((cat, index) => {
                const grid = grids[index];
                const productos = grid.querySelectorAll('.producto-card');
                let algunaCoincidencia = false;
                
                productos.forEach(producto => {
                    const nombre = producto.querySelector('h4').textContent.toLowerCase();
                    if (nombre.includes(termino)) {
                        producto.style.display = 'flex';
                        algunaCoincidencia = true;
                    } else {
                        producto.style.display = 'none';
                    }
                });
                
                if (algunaCoincidencia) {
                    cat.style.display = 'flex';
                    grid.style.display = 'grid';
                } else {
                    cat.style.display = 'none';
                    grid.style.display = 'none';
                }
            });
        });
    }

    // ==================== QUÍMICOS & AROMAS ====================
    async function cargarInventarioQuimicos() {
        try {
            const response = await fetch(URL_QUIMICOS_INVENTARIO);
            const data = await response.json();
            
            if (data.inventario) {
                quimicosInventario = data.inventario;
            } else {
                quimicosInventario = [];
            }
            
            await cargarMovimientosQuimicos();
            
        } catch (error) {
            console.error('Error cargando químicos:', error);
            Swal.fire('Error', 'No se pudo cargar el inventario de químicos', 'error');
            throw error;
        }
    }
    
    async function cargarMovimientosQuimicos() {
        try {
            const [entradas, salidas] = await Promise.all([
                fetch(URL_QUIMICOS_ENTRADAS).then(r => r.json()),
                fetch(URL_QUIMICOS_SALIDAS).then(r => r.json())
            ]);
            
            historialEntradas = entradas.map(e => [...e, 'entrada']);
            historialSalidas = salidas.map(s => [...s, 'salida']);
            
            actualizarSelectAnios();
        } catch (error) {
            console.error('Error cargando movimientos:', error);
        }
    }
    
    function actualizarSelectAnios() {
        const selectAnio = document.getElementById('filtroAnioHistorial');
        if (!selectAnio) return;
        
        const añosSet = new Set();
        
        [...historialEntradas, ...historialSalidas].forEach(item => {
            const fecha = new Date(item[0]);
            if (!isNaN(fecha.getTime())) {
                añosSet.add(fecha.getFullYear());
            }
        });
        
        const años = Array.from(añosSet).sort((a, b) => b - a);
        
        selectAnio.innerHTML = '<option value="todos">Año</option>';
        
        años.forEach(año => {
            const option = document.createElement('option');
            option.value = año;
            option.textContent = año;
            selectAnio.appendChild(option);
        });
        
        if (años.length === 0) {
            const añoActual = new Date().getFullYear();
            const option = document.createElement('option');
            option.value = añoActual;
            option.textContent = añoActual;
            selectAnio.appendChild(option);
        }
    }
    
    function mostrarInventarioQuimicos(datos) {
        const container = document.getElementById('quimicosContainer');
        const hoy = new Date();
        let totalUnidades = 0;
        
        if (!datos || datos.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-flask"></i>
                    <h3>No hay productos químicos</h3>
                    <p>No se encontraron productos en el inventario de químicos</p>
                </div>
            `;
            document.getElementById('totalQuimicos').textContent = '0';
            return;
        }
        
        const datosOrdenados = [...datos].sort((a, b) => new Date(a[1]) - new Date(b[1]));
        
        let html = `
            <div class="quimicos-container">
                <div class="quimicos-header">
                    <h3><i class="fas fa-chart-line"></i> Inventario por Lote</h3>
                    <div class="stats-badge" style="background: #f39c12; color: #333;">
                        <i class="fas fa-calendar-alt"></i> Ordenado por vencimiento
                    </div>
                </div>
                <div class="quimicos-table-container">
                    <table class="quimicos-table" id="tablaQuimicos">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Fecha de Vencimiento</th>
                                <th>Cantidad</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
        `;
        
        datosOrdenados.forEach(fila => {
            const [producto, vencimiento, cantidad] = fila;
            const cantidadNum = parseInt(cantidad) || 0;
            totalUnidades += cantidadNum;
            
            const fechaVen = new Date(vencimiento);
            const dia = String(fechaVen.getDate()).padStart(2, '0');
            const mes = String(fechaVen.getMonth() + 1).padStart(2, '0');
            const anio = fechaVen.getFullYear();
            const fechaStr = `${dia}/${mes}/${anio}`;
            
            const diffTime = fechaVen - hoy;
            const diffDias = diffTime / (1000 * 60 * 60 * 24);
            
            let estado = '';
            let clase = '';
            if (diffDias < 0) {
                estado = '<span class="badg-quimico-salida"><i class="fas fa-exclamation-circle"></i> VENCIDO</span>';
                clase = 'vencimiento-expirado';
            } else if (diffDias <= 60) {
                estado = `<span class="badg-quimico-entrada" style="background: #f39c12; color: #333;"><i class="fas fa-clock"></i> Por vencer (${Math.round(diffDias)} días)</span>`;
                clase = 'vencimiento-cercano';
            } else {
                estado = '<span class="badg-quimico-entrada"><i class="fas fa-check-circle"></i> Vigente</span>';
                clase = '';
            }
            
            html += `
                <tr class="${clase}">
                    <td style="text-align: center; font-weight: bold;">${escapeHTML(producto)}</td>
                    <td style="text-align: center;">${fechaStr}</td>
                    <td style="text-align: center; font-weight: bold;">${cantidadNum}</td>
                    <td style="text-align: center;">${estado}</td>
                </tr>
            `;
        });
        
        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        
        container.innerHTML = html;
        document.getElementById('totalQuimicos').textContent = totalUnidades;
        
        configurarBuscadorQuimicos();
    }
    
    function configurarBuscadorQuimicos() {
        const buscador = document.getElementById('buscadorQuimicos');
        if (buscador) {
            buscador.addEventListener('input', function() {
                const termino = this.value.toLowerCase().trim();
                const tabla = document.getElementById('tablaQuimicos');
                if (!tabla) return;
                const filas = tabla.querySelectorAll('tbody tr');
                
                filas.forEach(fila => {
                    const producto = fila.cells[0].textContent.toLowerCase();
                    if (termino === '' || producto.includes(termino)) {
                        fila.style.display = '';
                    } else {
                        fila.style.display = 'none';
                    }
                });
            });
        }
    }
    
    // ==================== HISTORIAL DE QUÍMICOS ====================
    async function cargarHistorialQuimicos() {
        showLoading();
        try {
            if (historialEntradas.length === 0 && historialSalidas.length === 0) {
                await cargarMovimientosQuimicos();
            }
            aplicarFiltrosHistorial();
        } catch (error) {
            console.error('Error cargando historial:', error);
            Swal.fire('Error', 'No se pudo cargar el historial', 'error');
        } finally {
            hideLoading();
        }
    }
    
    function aplicarFiltrosHistorial() {
        const tipo = document.getElementById('filtroTipoHistorial').value;
        const mes = document.getElementById('filtroMesHistorial').value;
        const anio = document.getElementById('filtroAnioHistorial').value;
        const producto = document.getElementById('filtroProductoHistorial').value.toLowerCase();
        
        let todos = [...historialEntradas, ...historialSalidas];
        
        todos = todos.filter(item => {
            const fecha = new Date(item[0]);
            const itemMes = String(fecha.getMonth() + 1).padStart(2, '0');
            const itemAnio = fecha.getFullYear().toString();
            
            if (tipo !== 'todos' && item[4] !== tipo) return false;
            if (mes !== 'todos' && itemMes !== mes) return false;
            if (anio !== 'todos' && itemAnio !== anio) return false;
            if (producto && !item[1].toLowerCase().includes(producto)) return false;
            
            return true;
        });
        
        todos.sort((a, b) => new Date(b[0]) - new Date(a[0]));
        
        mostrarTablaHistorial(todos);
    }
    
    function mostrarTablaHistorial(datos) {
        const tbody = document.querySelector("#tablaHistorialQuimicos tbody");
        if (!tbody) return;
        
        tbody.innerHTML = "";
        let totalUnidades = 0;
        
        datos.forEach(item => {
            const [fecha, producto, vencimiento, cantidad, tipo] = item;
            const cantidadNum = parseInt(cantidad) || 0;
            totalUnidades += cantidadNum;
            
            const badge = tipo === 'entrada' 
                ? '<span class="badg-quimico-entrada">ENTRADA</span>'
                : '<span class="badg-quimico-salida">SALIDA</span>';
            
            const fechaObj = new Date(fecha);
            const fechaFormateada = isNaN(fechaObj.getTime()) ? fecha : 
                fechaObj.toLocaleDateString('es-MX').split('/').map(p => p.padStart(2, '0')).join('/');
            
            let vencimientoFormateado = '-';
            if (vencimiento) {
                const venObj = new Date(vencimiento);
                if (!isNaN(venObj.getTime())) {
                    const dia = String(venObj.getDate()).padStart(2, '0');
                    const mes = String(venObj.getMonth() + 1).padStart(2, '0');
                    const anio = venObj.getFullYear();
                    vencimientoFormateado = `${dia}/${mes}/${anio}`;
                }
            }
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="text-align: center;">${fechaFormateada}</td>
                <td style="text-align: center;">${badge}</td>
                <td style="text-align: center; font-weight: bold;">${escapeHTML(producto)}</td>
                <td style="text-align: center;">${vencimientoFormateado}</td>
                <td style="text-align: center; font-weight: bold;">${cantidadNum}</td>
            `;
            tbody.appendChild(tr);
        });
        
        document.getElementById('totalCantidadHistorial').textContent = totalUnidades;
    }
    
    function escapeHTML(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function showLoading() {
        document.getElementById('loadingMessage').innerHTML = '<p>Por favor espera un momento...</p>';
        document.getElementById('overlay').style.display = 'flex';
    }
    
    function hideLoading() {
        document.getElementById('overlay').style.display = 'none';
    }
    
    // Inicializar
    $(document).ready(async function() {
        showLoading();
        
        try {
            await Promise.all([
                cargarInventarioGeneral(),
                cargarInventarioQuimicos()
            ]);
            
            const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            const selMes = document.getElementById('filtroMesHistorial');
            if (selMes) {
                selMes.innerHTML = '<option value="todos">Mes</option>';
                meses.forEach((m, i) => {
                    const option = document.createElement('option');
                    option.value = String(i + 1).padStart(2, '0');
                    option.textContent = m;
                    selMes.appendChild(option);
                });
            }
            
            const filtroTipo = document.getElementById('filtroTipoHistorial');
            const filtroMes = document.getElementById('filtroMesHistorial');
            const filtroAnio = document.getElementById('filtroAnioHistorial');
            const filtroProducto = document.getElementById('filtroProductoHistorial');
            
            if (filtroTipo) filtroTipo.addEventListener('change', aplicarFiltrosHistorial);
            if (filtroMes) filtroMes.addEventListener('change', aplicarFiltrosHistorial);
            if (filtroAnio) filtroAnio.addEventListener('change', aplicarFiltrosHistorial);
            if (filtroProducto) filtroProducto.addEventListener('input', aplicarFiltrosHistorial);
            
        } catch (error) {
            console.error('Error al cargar los datos:', error);
        } finally {
            hideLoading();
        }
    });
</script>
